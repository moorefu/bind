name: Build BIND

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      openssl_version:
        required: false
        type: string
        default: '1.1.1w'
      make_latest:
        required: false
        type: boolean
        default: false
      prerelease:
        required: false
        type: boolean
        default: false
    outputs:
      release_version:
        description: "The version of BIND being built"
        value: ${{ jobs.prepare.outputs.release_version }}

  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to build (e.g. 9.18.48)'
        required: true
        type: string
      openssl_version:
        description: 'OpenSSL version (e.g. 1.1.1w, 3.0.15)'
        required: false
        type: string
        default: '1.1.1w'
      make_latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.setup.outputs.version }}
      openssl_version: ${{ steps.setup.outputs.openssl_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        id: setup
        run: |
          VERSION="${{ inputs.release_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "openssl_version=${{ inputs.openssl_version }}" >> $GITHUB_OUTPUT

  build-linux:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux2014_x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux2014_aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build in manylinux container
        env:
          BIND_VERSION: ${{ needs.prepare.outputs.release_version }}
          ARCH: ${{ matrix.arch }}
          OS_VER: ${{ needs.prepare.outputs.openssl_version }}
        run: |
          docker run --rm \
            -e BIND_VERSION \
            -e ARCH \
            -e OS_VER \
            -v "$(pwd)":/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            sh -c '
              set -e

              for dts in /opt/rh/devtoolset-*/enable; do
                [ -f "$dts" ] && source "$dts" && break
              done
              GCC_VER=$(gcc -dumpversion | cut -d. -f1)
              if [ "$GCC_VER" -lt 5 ]; then
                echo "ERROR: GCC >= 5 required, found GCC ${GCC_VER}"
                exit 1
              fi

              yum install -y epel-release

              yum groupinstall -y "Development Tools"
              yum install -y \
                curl pkgconfig perl-core perl-devel zlib-devel \
                libuv-devel libcap-devel \
                xz autoconf automake libtool

              yum install -y \
                jemalloc-devel json-c-devel libxml2-devel \
                libevent-devel \
                || true

              PREFIX=/usr/local/bind

              # Build OpenSSL (system 1.0.2 lacks Ed25519/Ed448 and modern APIs)
              OPENSSL_URL="https://www.openssl.org/source/openssl-${OS_VER}.tar.gz"
              [ "${OS_VER%%.*}" = "3" ] && \
                OPENSSL_URL="https://github.com/openssl/openssl/releases/download/openssl-${OS_VER}/openssl-${OS_VER}.tar.gz"
              curl -fsSL "$OPENSSL_URL" | tar xzf -
              cd "openssl-${OS_VER}"
              ./config --prefix="$PREFIX" --openssldir="$PREFIX/ssl" --libdir="$PREFIX/lib"
              make -j$(nproc)
              make install_sw
              cd ..

              export PATH="$PREFIX/bin:$PATH"
              export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"

              # Build protobuf from source (EPEL only has 2.5, protobuf-c needs >= 2.6.1)
              PB_VER=3.20.3
              curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PB_VER}/protobuf-cpp-${PB_VER}.tar.gz" | tar xzf -
              cd "protobuf-${PB_VER}"
              ./configure --prefix="$PREFIX" --disable-shared --with-pic
              make -j$(nproc)
              make install
              cd ..

              # Build protobuf-c
              PBC_VER=1.4.1
              curl -fsSL "https://github.com/protobuf-c/protobuf-c/releases/download/v${PBC_VER}/protobuf-c-${PBC_VER}.tar.gz" | tar xzf -
              cd "protobuf-c-${PBC_VER}"
              ./configure --prefix="$PREFIX" --disable-shared --with-pic
              make -j$(nproc)
              make install
              cd ..

              # Build libfstrm
              FS_VER=0.6.1
              curl -fsSL "https://dl.farsightsecurity.com/dist/fstrm/fstrm-${FS_VER}.tar.gz" | tar xzf -
              cd "fstrm-${FS_VER}"
              ./configure --prefix="$PREFIX" --disable-shared --with-pic
              make -j$(nproc)
              make install
              cd ..

              # Download BIND
              URL="https://downloads.isc.org/isc/bind9/${BIND_VERSION}/bind-${BIND_VERSION}.tar.xz"
              echo "Downloading $URL"
              curl -fsSL "$URL" -o "bind-${BIND_VERSION}.tar.xz"
              tar xJf "bind-${BIND_VERSION}.tar.xz"
              cd "bind-${BIND_VERSION}"

              LDFLAGS="-L$PREFIX/lib -Wl,-rpath,$PREFIX/lib" \
              ./configure \
                --prefix="$PREFIX" \
                --sysconfdir=/etc/bind \
                --localstatedir=/var \
                --with-openssl="$PREFIX" \
                --with-json-c \
                --with-libxml2 \
                --with-jemalloc \
                --enable-dnstap \
                --disable-doh

              make -j$(nproc)
              make install DESTDIR=/workspace/install

              # Bundle non-glibc shared libs into the package
              mkdir -p /workspace/install$PREFIX/lib
              cp -a "$PREFIX/lib"/libssl.so* "$PREFIX/lib"/libcrypto.so* /workspace/install$PREFIX/lib/
              cp -a /usr/lib64/libuv.so* /usr/lib64/libjson-c.so* \
                    /usr/lib64/libcap.so* /usr/lib64/libxml2.so* /usr/lib64/libjemalloc.so* \
                    /workspace/install$PREFIX/lib/ 2>/dev/null || true

              find /workspace/install -type f -executable -exec strip --strip-all {} \; 2>/dev/null || true

              DIST="bind-${BIND_VERSION}-linux-glibc2.17-${ARCH}-openssl-${OS_VER}"
              cd /workspace/install
              tar -cJf "/workspace/${DIST}.tar.xz" usr/local/bind etc/bind
              sha256sum "/workspace/${DIST}.tar.xz" > "/workspace/${DIST}.tar.xz.sha256"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bind-linux-${{ matrix.arch }}
          path: |
            bind-*-linux-glibc2.17-${{ matrix.arch }}-openssl-*.tar.xz
            bind-*-linux-glibc2.17-${{ matrix.arch }}-openssl-*.tar.xz.sha256

  release:
    needs: [prepare, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Set version
        run: |
          echo "VERSION=${{ needs.prepare.outputs.release_version }}" >> $GITHUB_ENV
          echo "OS_VER=${{ needs.prepare.outputs.openssl_version }}" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: BIND ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          make_latest: "${{ inputs.make_latest }}"
          prerelease: ${{ inputs.prerelease }}
          files: |
            bind-linux-x86_64/bind-${{ env.VERSION }}-linux-glibc2.17-x86_64-openssl-${{ env.OS_VER }}.tar.xz
            bind-linux-x86_64/bind-${{ env.VERSION }}-linux-glibc2.17-x86_64-openssl-${{ env.OS_VER }}.tar.xz.sha256
            bind-linux-aarch64/bind-${{ env.VERSION }}-linux-glibc2.17-aarch64-openssl-${{ env.OS_VER }}.tar.xz
            bind-linux-aarch64/bind-${{ env.VERSION }}-linux-glibc2.17-aarch64-openssl-${{ env.OS_VER }}.tar.xz.sha256
